{% extends 'base.html' %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <span>Editar mis datos</span>
                    <a href="{% url 'change_password' %}" class="btn btn-sm btn-outline-secondary">Cambiar Contraseña</a>
                </div>

                <div class="card-body">
                    <p>Aquí puedes editar tu información de contacto. Para cualquier otro cambio, por favor contacta al administrador.</p>
                    <form method="post" enctype="multipart/form-data">
                        {% csrf_token %}
                        {{ form.as_p }}
                        <button type="submit" class="btn btn-primary">Guardar cambios</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
